kind = "web"
previewPath = "/"
title = "Job Hunt Toolkit"
version = "1.0.0"
id = "artifacts/job-hunt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25452

[services.development]
run = "pnpm --filter @workspace/job-hunt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/job-hunt", "run", "build" ]
publicDir = "artifacts/job-hunt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25452"
BASE_PATH = "/"
