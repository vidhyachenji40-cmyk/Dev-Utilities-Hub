openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: Authenticated user operations
  - name: applications
    description: Job application tracking operations
  - name: interview
    description: Interview prep sessions, questions, and AI feedback
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Current authenticated user
      description: Returns the profile of the currently signed-in user. Creates a local user record on first call.
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List job applications
      description: Returns all job applications for the signed-in user, most recently updated first.
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplicationList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Create a job application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobApplicationRequest"
      responses:
        "201":
          description: Created application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplication"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /applications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get a single job application with notes
      responses:
        "200":
          description: The application with notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplicationDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update a job application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobApplicationRequest"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobApplication"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApplication
      tags: [applications]
      summary: Delete a job application
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /applications/{id}/notes:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: createApplicationNote
      tags: [applications]
      summary: Add a note or activity entry to an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationNoteRequest"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationNote"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /applications/{id}/notes/{noteId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: noteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: deleteApplicationNote
      tags: [applications]
      summary: Delete a note from an application
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pipeline-summary:
    get:
      operationId: getPipelineSummary
      tags: [applications]
      summary: Pipeline counts and recent activity
      description: Returns counts of applications per stage plus the most recent activity for the signed-in user.
      responses:
        "200":
          description: Pipeline summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /interview/sessions:
    get:
      operationId: listInterviewSessions
      tags: [interview]
      summary: List interview prep sessions
      description: Returns all interview sessions for the signed-in user, most recently created first.
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createInterviewSession
      tags: [interview]
      summary: Start an interview session
      description: Generates a curated mix of questions tailored to the requested role/level/focus and returns the new session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterviewSessionRequest"
      responses:
        "201":
          description: Created session with generated questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetail"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream AI request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /interview/sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getInterviewSession
      tags: [interview]
      summary: Get an interview session with all answers and feedback
      responses:
        "200":
          description: Session detail with answers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteInterviewSession
      tags: [interview]
      summary: Delete an interview session
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /interview/sessions/{id}/answers:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: submitInterviewAnswer
      tags: [interview]
      summary: Submit an answer and receive AI feedback
      description: Saves the answer for the given question and returns AI-generated feedback (clarity, structure, specificity, strengths, improvements).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInterviewAnswerRequest"
      responses:
        "200":
          description: Updated existing answer with refreshed AI feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewAnswer"
        "201":
          description: Saved new answer with AI feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewAnswer"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream AI request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CurrentUser:
      type: object
      properties:
        id:
          type: string
          description: Clerk user id
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - imageUrl
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    JobApplicationStatus:
      type: string
      enum:
        - Saved
        - Applied
        - Interviewing
        - Offer
        - Rejected
    JobApplication:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company:
          type: string
        role:
          type: string
        link:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        salaryMin:
          type: ["string", "null"]
        salaryMax:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/JobApplicationStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - company
        - role
        - link
        - location
        - salaryMin
        - salaryMax
        - source
        - status
        - createdAt
        - updatedAt
    JobApplicationList:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/JobApplication"
      required:
        - applications
    ApplicationNote:
      type: object
      properties:
        id:
          type: string
          format: uuid
        applicationId:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - applicationId
        - body
        - createdAt
    JobApplicationDetail:
      type: object
      properties:
        application:
          $ref: "#/components/schemas/JobApplication"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationNote"
      required:
        - application
        - notes
    CreateJobApplicationRequest:
      type: object
      properties:
        company:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        link:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        salaryMin:
          type: ["string", "null"]
        salaryMax:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/JobApplicationStatus"
      required:
        - company
        - role
    UpdateJobApplicationRequest:
      type: object
      properties:
        company:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        link:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        salaryMin:
          type: ["string", "null"]
        salaryMax:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/JobApplicationStatus"
    CreateApplicationNoteRequest:
      type: object
      properties:
        body:
          type: string
          minLength: 1
      required:
        - body
    PipelineStageCount:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/JobApplicationStatus"
        count:
          type: integer
          minimum: 0
      required:
        - status
        - count
    PipelineRecentActivity:
      type: object
      properties:
        applicationId:
          type: string
          format: uuid
        company:
          type: string
        role:
          type: string
        status:
          $ref: "#/components/schemas/JobApplicationStatus"
        updatedAt:
          type: string
          format: date-time
      required:
        - applicationId
        - company
        - role
        - status
        - updatedAt
    PipelineSummary:
      type: object
      properties:
        total:
          type: integer
          minimum: 0
        stages:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStageCount"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/PipelineRecentActivity"
      required:
        - total
        - stages
        - recentActivity
    InterviewFocus:
      type: string
      enum:
        - Behavioral
        - Technical
        - Mixed
    InterviewLevel:
      type: string
      enum:
        - Intern
        - Junior
        - Mid
        - Senior
        - Staff
    InterviewQuestionType:
      type: string
      enum:
        - Behavioral
        - Technical
    InterviewQuestion:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/InterviewQuestionType"
        text:
          type: string
        starHint:
          type: ["string", "null"]
      required:
        - id
        - type
        - text
        - starHint
    InterviewFeedback:
      type: object
      properties:
        clarity:
          type: integer
          minimum: 1
          maximum: 5
        structure:
          type: integer
          minimum: 1
          maximum: 5
        specificity:
          type: integer
          minimum: 1
          maximum: 5
        summary:
          type: string
        strengths:
          type: array
          items:
            type: string
        improvements:
          type: array
          items:
            type: string
      required:
        - clarity
        - structure
        - specificity
        - summary
        - strengths
        - improvements
    InterviewSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
        level:
          $ref: "#/components/schemas/InterviewLevel"
        focus:
          $ref: "#/components/schemas/InterviewFocus"
        company:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        applicationId:
          type: ["string", "null"]
          format: uuid
        questionCount:
          type: integer
          minimum: 0
        answeredCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - level
        - focus
        - company
        - notes
        - applicationId
        - questionCount
        - answeredCount
        - createdAt
        - updatedAt
    InterviewSessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/InterviewSession"
      required:
        - sessions
    InterviewAnswer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        questionId:
          type: string
        questionText:
          type: string
        body:
          type: string
        feedback:
          oneOf:
            - $ref: "#/components/schemas/InterviewFeedback"
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - sessionId
        - questionId
        - questionText
        - body
        - feedback
        - createdAt
        - updatedAt
    InterviewSessionDetail:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/InterviewSession"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/InterviewQuestion"
        answers:
          type: array
          items:
            $ref: "#/components/schemas/InterviewAnswer"
      required:
        - session
        - questions
        - answers
    CreateInterviewSessionRequest:
      type: object
      properties:
        role:
          type: string
          minLength: 1
        level:
          $ref: "#/components/schemas/InterviewLevel"
        focus:
          $ref: "#/components/schemas/InterviewFocus"
        company:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        applicationId:
          type: ["string", "null"]
          format: uuid
        questionCount:
          type: integer
          minimum: 3
          maximum: 10
      required:
        - role
        - level
        - focus
    SubmitInterviewAnswerRequest:
      type: object
      properties:
        questionId:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
      required:
        - questionId
        - body
